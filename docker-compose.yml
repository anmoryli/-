# ============================================
# 孕期宝 · Docker Compose 一键部署
# ============================================
# 使用前：
#   1. 复制 .env.example 为 .env 并填写真实配置
#   2. 运行：docker compose up -d --build
#   3. 访问：前端 http://localhost:3000 | 后端 http://localhost:9677 | 管理后台 http://localhost:5000
# ============================================

services:
  # ==========================================
  # 后端 Spring Boot
  # ==========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yunqibao-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-9677}:9677"
    environment:
      # ---- 数据库 ----
      SPRING_DATASOURCE_URL: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT:-3306}/${MYSQL_DATABASE:-yunfu}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&connectTimeout=15000&socketTimeout=30000
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      # ---- Redis ----
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT:-6379}
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # ---- AI ----
      SPRING_AI_OPENAI_API_KEY: ${OPENAI_API_KEY}
      SPRING_AI_OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.xty.app}
      # ---- 阿里云 OSS ----
      ALIOSS_ENDPOINT: ${OSS_ENDPOINT:-https://oss-cn-beijing.aliyuncs.com}
      ALIOSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID}
      ALIOSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET}
      ALIOSS_BUCKET_NAME: ${OSS_BUCKET_NAME:-cangqion-delong}
      # ---- 邮件 ----
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD}
      # ---- 其他 ----
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      SECURITY_AES_KEY: ${AES_KEY:-0123456789abcdef0123456789abcdef}
      SECURITY_AES_IV: ${AES_IV:-abcdef9876543210}
      TZ: Asia/Shanghai
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9677/api/user/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - yunqibao-net

  # ==========================================
  # 前端 Next.js
  # ==========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # 浏览器端默认走同源代理（/api-backend），不需要写死后端地址
        NEXT_PUBLIC_API_BASE_URL: ""
    container_name: yunqibao-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      TZ: Asia/Shanghai
    depends_on:
      backend:
        condition: service_started
    networks:
      - yunqibao-net

  # ==========================================
  # 管理后台 Flask
  # ==========================================
  admin:
    build:
      context: ./admin-app
      dockerfile: Dockerfile
    container_name: yunqibao-admin
    restart: unless-stopped
    ports:
      - "${ADMIN_PORT:-5000}:5000"
    environment:
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-yunfu}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      SECRET_KEY: ${FLASK_SECRET_KEY:-yunqibao-admin-secret}
      TZ: Asia/Shanghai
    depends_on:
      backend:
        condition: service_started
    networks:
      - yunqibao-net

  # ==========================================
  # Nginx 反向代理（统一入口）
  # ==========================================
  nginx:
    image: nginx:alpine
    container_name: yunqibao-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
      - admin
    networks:
      - yunqibao-net

networks:
  yunqibao-net:
    driver: bridge
